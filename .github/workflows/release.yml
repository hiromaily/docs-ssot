name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.1"

jobs:
  release:
    name: Release
    # IMPORTANT: Do NOT use ubuntu-slim here. GoReleaser parallelism defaults to
    # GOMAXPROCS (= CPU count). ubuntu-slim has 2 CPUs causing sequential builds (~12min),
    # while ubuntu-latest has 4 CPUs enabling parallel builds (~3min).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
