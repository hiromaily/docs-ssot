  - input: template/ai-agents/copilot/instructions/git.tpl.md
    output: .github/instructions/git.instructions.md

  - input: template/ai-agents/copilot/instructions/go.tpl.md
    output: .github/instructions/go.instructions.md

  - input: template/ai-agents/copilot/instructions/go-test.tpl.md
    output: .github/instructions/go-test.instructions.md

  # ── Copilot: skills ────────────────────────────────────────
  - input: template/ai-agents/copilot/skills/fix-pr-reviews/SKILL.tpl.md
    output: .github/skills/fix-pr-reviews/SKILL.md
