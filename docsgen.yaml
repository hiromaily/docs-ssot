targets:
  # ── Documents ──────────────────────────────────────────────
  - input: template/pages/README.tpl.md
    output: README.md

  - input: template/pages/AGENTS.tpl.md
    output: AGENTS.md

  - input: template/pages/CLAUDE.tpl.md
    output: CLAUDE.md

  # ── Claude Code: rules ─────────────────────────────────────
  - input: template/ai-agents/claude/rules/general.tpl.md
    output: .claude/rules/general.md

  - input: template/ai-agents/claude/rules/docs.tpl.md
    output: .claude/rules/docs.md

  - input: template/ai-agents/claude/rules/git.tpl.md
    output: .claude/rules/git.md

  - input: template/ai-agents/claude/rules/go.tpl.md
    output: .claude/rules/go.md

  - input: template/ai-agents/claude/rules/go-test.tpl.md
    output: .claude/rules/go-test.md

  # ── Claude Code: commands ──────────────────────────────────
  - input: template/ai-agents/claude/commands/fix-pr-reviews.tpl.md
    output: .claude/commands/fix-pr-reviews.md

  # ── Cursor: rules ──────────────────────────────────────────
  - input: template/ai-agents/cursor/rules/general.tpl.mdc
    output: .cursor/rules/general.mdc

  - input: template/ai-agents/cursor/rules/docs.tpl.mdc
    output: .cursor/rules/docs.mdc

  - input: template/ai-agents/cursor/rules/git.tpl.mdc
    output: .cursor/rules/git.mdc

  - input: template/ai-agents/cursor/rules/go.tpl.mdc
    output: .cursor/rules/go.mdc

  - input: template/ai-agents/cursor/rules/go-test.tpl.mdc
    output: .cursor/rules/go-test.mdc

  # ── Cursor: skills ─────────────────────────────────────────
  - input: template/ai-agents/cursor/skills/fix-pr-reviews/SKILL.tpl.md
    output: .cursor/skills/fix-pr-reviews/SKILL.md

  # ── Codex: AGENTS.md (with rules) ────────────────────────────
  - input: template/ai-agents/codex/AGENTS.tpl.md
    output: AGENTS-codex.md

  # ── Codex: skills ──────────────────────────────────────────
  - input: template/ai-agents/codex/skills/fix-pr-reviews/SKILL.tpl.md
    output: .agents/skills/fix-pr-reviews/SKILL.md

  # ── Copilot: instructions ──────────────────────────────────
  - input: template/ai-agents/copilot/instructions/general.tpl.md
    output: .github/instructions/general.instructions.md

  - input: template/ai-agents/copilot/instructions/docs.tpl.md
