# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: docs-ssot
    main: ./cmd/docs-ssot
    binary: docs-ssot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.appVersion={{.Version}}

archives:
  - id: docs-ssot
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_ {{- .Version }}_ {{- .Os }}_ {{- .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "🚀 Features"
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "🔄 Refactoring"
      regexp: '^.*?refactor(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: "📦 Dependencies"
      regexp: '^.*?(deps|build)(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: "Others"
      order: 999

brews:
  - name: docs-ssot
    repository:
      owner: hiromaily
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hiromaily/docs-ssot"
    description: "Documentation Single Source of Truth (SSOT) generator"
    license: "MIT"
    install: |
      bin.install "docs-ssot"
    test: |
      system "#{bin}/docs-ssot", "version"

release:
  github:
    owner: hiromaily
    name: docs-ssot
  draft: false
  prerelease: auto
  mode: replace
  name_template: "{{.Tag}}"
